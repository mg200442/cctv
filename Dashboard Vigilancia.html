document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, #1c2024, #2A2E33); border-radius: 2px;\"><\u002Fdiv>\n        <!-- playhead -->\n        <div style=\"{{ playheadStyle }}\">\n          <div style=\"position: absolute; top: -2px; left: 50%; transform: translateX(-50%); width: 11px; height: 11px; background: #ECE8E1; border: 2px solid #08090A; border-radius: 3px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; align-items: center; gap: 12px;\">\n        <div style=\"font-family: 'DM Mono', monospace; font-size: 14px; color: #ECE8E1; letter-spacing: .04em; width: 64px; text-align: right;\">{{ headTime }}<\u002Fdiv>\n        <button style=\"display: flex; align-items: center; gap: 7px; padding: 9px 13px; border: 2px solid #20242A; border-radius: 10px; background: #0E1012; color: #C9C4BB; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .04em; cursor: pointer;\"><i data-lucide=\"gauge\" style=\"width: 14px; height: 14px;\"><\u002Fi> 1.0x<\u002Fbutton>\n        <button style=\"display: flex; align-items: center; gap: 7px; padding: 9px 13px; border: 2px solid #20242A; border-radius: 10px; background: #0E1012; color: #C9C4BB; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .04em; cursor: pointer;\"><i data-lucide=\"download\" style=\"width: 14px; height: 14px;\"><\u002Fi> EXPORTAR<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1512,&quot;height&quot;:950},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#38BDF8&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#E07820&quot;,&quot;#38BDF8&quot;,&quot;#36D399&quot;,&quot;#A78BFA&quot;],&quot;section&quot;:&quot;Tema&quot;},&quot;showAiBoxes&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Overlays&  'Movimiento inusual', sev: 'MEDIA', icon: 'radar', tone: 'amber' },\n    { time: '14:22:40', cam: 'CAM 02', zone: 'Parking Norte', type: 'Vehiculo detectado', sev: 'BAJA', icon: 'car', tone: 'cyan' },\n    { time: '14:15:03', cam: 'CAM 03', zone: 'Recepcion', type: 'Acceso autorizado', sev: 'INFO', icon: 'door-open', tone: 'green' },\n    { time: '14:09:47', cam: 'CAM 06', zone: 'Almacen', type: 'Camara sin senal', sev: 'MEDIA', icon: 'video-off', tone: 'amber' },\n    { time: '13:58:21', cam: 'CAM 01', zone: 'Entrada', type: 'Movimiento detectado', sev: 'BAJA', icon: 'radar', tone: 'cyan' }\n  ];\n\n  devices = [\n    { id: 'CAM 01', zone: 'Entrada Principal', on: true, status: 'ONLINE' },\n    { id: 'CAM 02', zone: 'Parking Norte', on: true, status: 'ONLINE' },\n    { id: 'CAM 03', zone: 'Recepcion', on: true, status: 'ONLINE' },\n    { id: 'CAM 04', zone: 'Pasillo B2 · bat 82%', on: true, status: 'ONLINE' },\n    { id: 'CAM 05', zone: 'Perimetro Este · bat 64%', on: true, status: 'ONLINE' },\n    { id: 'CAM 06', zone: 'Almacen', on: false, status: 'OFFLINE' }\n  ];\n\n  componentDidMount() {\n    this._clk = setInterval(() => this.setState({ now: new Date() }), 1000);\n    this.tryIcons(0);\n  }\n  componentDidUpdate() { this.renderIcons(); }\n  componentWillUnmount() { clearInterval(this._clk); clearInterval(this._play); }\n\n  tryIcons(n) { if (window.lucide) { this.renderIcons(); } else if (n < 50) { setTimeout(() => this.tryIcons(n + 1), 100); } }\n  renderIcons() { try { if (window.lucide) window.lucide.createIcons(); } catch (e) {} }\n\n  pad(n) { return String(n).padStart(2, '0'); }\n\n  togglePlay() {\n    if (this.state.playing) {\n      clearInterval(this._play);\n      this.setState({ playing: false });\n    } else {\n      this.setState({ playing: true, live: false });\n      this._play = setInterval(() => {\n        this.setState(s => {\n          let p = s.pos + 0.4;\n          if (p >= 100) { clearInterval(this._play); return { pos: 100, playing: false, live: true }; }\n          return { pos: p };\n        });\n      }, 120);\n    }\n  }\n\n  clickTimeline(e) {\n    const r = e.currentTarget.getBoundingClientRect();\n    let p = ((e.clientX - r.left) / r.width) * 100;\n    p = Math.max(0, Math.min(100, p));\n    clearInterval(this._play);\n    this.setState({ pos: p, playing: false, live: p > 99 });\n  }\n\n  renderVals() {\n    const accent = this.props.accentColor ?? '#E07820';\n    const showAi = this.props.showAiBoxes ?? true;\n    const scanlines = this.props.scanlines ?? true;\n    const sel = this.state.sel;\n\n    const toneMap = {\n      red:   { color: '#FF5247', bg: '#1A0E0D' },\n      amber: { color: accent,    bg: '#1A130A' },\n      cyan:  { color: '#38BDF8', bg: '#0B1620' },\n      green: { color: '#36D399', bg: '#0B1A14' }\n    };\n    const boxColor = { accent: accent, cyan: '#38BDF8', red: '#FF5247' };\n\n    const d = this.state.now;\n    const timeStr = this.pad(d.getHours()) + ':' + this.pad(d.getMinutes()) + ':' + this.pad(d.getSeconds());\n    const dias = ['DOM','LUN','MAR','MIE','JUE','VIE','SAB'];\n    const meses = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];\n    const dateStr = dias[d.getDay()] + ' ' + this.pad(d.getDate()) + ' ' + meses[d.getMonth()] + ' ' + d.getFullYear();\n    const tsBase = d.getFullYear() + '-' + this.pad(d.getMonth()+1) + '-' + this.pad(d.getDate()) + ' ' + timeStr;\n\n    const cameras = this.baseCams.map((c, i) => {\n      const selected = i === sel;\n      const sceneStyle = 'position:absolute;inset:0;background:' + (c.offline ? '#0c0c0c' : c.scene)\n        + (c.offline ? ';display:flex;align-items:center;justify-content:center' : '');\n      const ringStyle = 'position:absolute;inset:0;border-radius:10px;pointer-events:none;border:'\n        + (selected ? '2px solid ' + accent + ';box-shadow:inset 0 0 0 1px ' + accent + ', 0 0 22px -2px ' + accent : '2px solid transparent');\n      const boxes = (showAi && !c.offline) ? c.boxes.map(b => {\n        const col = boxColor[b.kind] || accent;\n        return {\n          style: 'position:absolute;left:' + b.x + '%;top:' + b.y + '%;width:' + b.w + '%;height:' + b.h\n            + '%;border:2px solid ' + col + ';border-radius:4px;animation:aipulse 2.4s ease-in-out infinite;pointer-events:none;',\n          labelStyle: 'position:absolute;top:-16px;left:-2px;white-space:nowrap;font-size:8px;letter-spacing:.06em;padding:1px 5px;border-radius:3px;background:'\n            + col + ';color:#08090A;font-family:DM Mono,monospace;',\n          label: b.label\n        };\n      }) : [];\n      return {\n        id: c.id, zone: c.zone, fps: c.fps,\n        ts: c.offline ? 'SIN SENAL' : tsBase,\n        sigColor: c.offline ? '#FF5247' : '#36D399',\n        sceneStyle, ringStyle, boxes,\n        onSelect: () => this.setState({ sel: i })\n      };\n    });\n\n    const alerts = this.alerts.map(a => {\n      const t = toneMap[a.tone];\n      return { time: a.time, cam: a.cam, zone: a.zone, type: a.type, sev: a.sev, icon: a.icon, color: t.color, bg: t.bg };\n    });\n\n    const devices = this.devices.map(v => ({ id: v.id, zone: v.zone, status: v.status, dot: v.on ? '#36D399' : '#FF5247' }));\n\n    const hours = [];\n    for (let h = 0; h <= 24; h += 3) hours.push({ label: this.pad(h) + ':00', left: (h / 24 * 100) + '%' });\n\n    const tlEvents = [\n      { left: '12%', color: '#38BDF8' }, { left: '24%', color: accent }, { left: '38%', color: '#FF5247' },\n      { left: '47%', color: accent }, { left: '58%', color: '#36D399' }, { left: '69%', color: '#FF5247' },\n      { left: '81%', color: '#38BDF8' }, { left: '93%', color: '#FF5247' }\n    ];\n\n    const pos = this.state.pos;\n    const playheadStyle = 'position:absolute;top:0;bottom:0;width:2px;background:' + accent\n      + ';left:' + pos + '%;box-shadow:0 0 10px ' + accent + ';';\n    const totalMin = Math.round(pos / 100 * 1439);\n    const headTime = this.pad(Math.floor(totalMin / 60)) + ':' + this.pad(totalMin % 60);\n\n    const live = this.state.live;\n    const livePillStyle = 'display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:999px;border:2px solid '\n      + (live ? '#1f5a3a' : '#20242A') + ';background:' + (live ? '#0B1A14' : '#0E1012') + ';color:' + (live ? '#36D399' : '#7E858C') + ';';\n\n    return {\n      accent, scanlines,\n      timeStr, dateStr,\n      focusLabel: this.baseCams[sel].zone,\n      cameras, alerts, devices, hours, tlEvents,\n      togglePlay: () => this.togglePlay(),\n      clickTimeline: (e) => this.clickTimeline(e),\n      playIcon: this.state.playing ? 'pause' : 'play',\n      playheadStyle, headTime,\n      livePillStyle,\n      liveLabel: live ? 'EN DIRECTO' : 'REPRODUCIENDO',\n      liveDotColor: live ? '#36D399' : accent\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
