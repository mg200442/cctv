<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets env(safe-area-inset-*) resolve to real values
         instead of 0 on notched/home-indicator phones — used by the mobile
         bottom nav bar (see Sidebar.tsx) so it clears the gesture area. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0C0E10" />
    <meta name="description" content="Dashboard CCTV para gestionar cámaras, grabaciones y alertas de movimiento." />

    <!-- PWA — installable on mobile/tablet home screens (Android via the
         manifest below, iOS via the apple-* tags, which Safari still
         requires separately even though it now reads manifest.json too). -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" href="/icon-192.png" type="image/png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SENTINEL·OPS" />

    <title>Dashboard Vigilancia</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
